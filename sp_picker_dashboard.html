// Category rules
const CATS = [
  { id: 'all', label: '全部', match: () => true },
  { id: 'beauty', label: '💄 美容个护', match: t => /hair|cream|facial|beauty|liner|cleanser|ipl|ear|skin|nail|lash|cosmetic|makeup|lotion|serum/i.test(t) },
  { id: 'clothing', label: '👗 服装鞋帽', match: t => /dress|pants|shoes|sandal|jacket|shirt|top|skirt|legging|sneaker|boot|socks|hoodi|sleeve|blazer|jeans|coat|swimsuit|bikini|bra|underwear/i.test(t) },
  { id: 'home', label: '🏠 家居厨房', match: t => /cookware|baking|broom|pan|pot|bowl|mug|cup|storage|bag|bedding|pillow|curtain|lamp|shelf|rack|organizer|kitchen|cook|home/i.test(t) },
  { id: 'auto', label: '🚗 汽车配件', match: t => /tire|tyre|motorcycle|car|headlight|disc lock|vehicle|auto|motor|wheel|wiper|seat cover/i.test(t) },
  { id: 'electronics', label: '📱 电子数码', match: t => /camera|drone|solar|screen|wireless|touchscreen|fan|bluetooth|speaker|headphone|earphone|charger|battery|power station|solar|4g|lte|wifi|smart|monitor|display|electronic/i.test(t) },
  { id: 'tools', label: '🔧 工具五金', match: t => /wrench|tool bag|wire puller|disc lock|tool|plier|drill|saw|screwdriver|hammer|level|laser|canvas bag|box cutter|tape/i.test(t) },
];

// Chinese translations (keyword-based)
const CN_MAP = [
  [/hair removal|haarentfernung/i, '脱毛仪'],
  [/ipl/i, 'IPL 冰点脱毛仪'],
  [/cookware|kochset/i, '炊具套装'],
  [/baking (tray|pan)|carbon steel/i, '碳钢烤盘'],
  [/broom/i, '硅胶扫把'],
  [/motorcycle.*disc lock|disc lock/i, '摩托车报警碟刹锁'],
  [/canvas tool bag|tool bag/i, '帆布工具袋'],
  [/wire puller/i, '穿线器'],
  [/wrench/i, '扳手'],
  [/electricity saving box/i, '节电器'],
  [/solar.*camera|camera.*solar/i, '太阳能摄像头'],
  [/4g lte.*camera|camera.*4g/i, '4G LTE 太阳能监控摄像头'],
  [/power station/i, '便携储能电源'],
  [/drone/i, '水面无人机'],
  [/ear cleaner/i, '电动洗耳器'],
  [/wireless.*adapter|adapter.*wireless/i, '无线 CarPlay 适配器'],
  [/jet fan|portable fan/i, '便携喷气风扇'],
  [/military watch/i, '军事风格双显手表'],
  [/tactical cargo pants/i, '战术多口袋工装裤'],
  [/touchscreen display/i, '无线智能触控屏'],
  [/headlight/i, '车灯修复套装'],
  [/magnifying glass/i, '折叠放大镜'],
  [/sandal/i, '露趾凉鞋'],
  [/summer.*dress|babydoll dress|maxi dress/i, '夏季连衣裙'],
  [/sneaker|platform shoe/i, '厚底运动鞋'],
  [/striped.*pants|side pocket pants/i, '条纹侧口袋休闲裤'],
  [/spray|degreaser/i, '多用途去污喷雾'],
  [/gel liner/i, '防水眼线胶笔'],
  [/hair removal cream/i, '温和脱毛膏'],
  [/marble/i, '大理石纹地面漆'],
  [/tile wax|tire wax/i, '轮胎光亮蜡'],
  [/mug/i, '马克杯'],
  [/oral irrigator|water flosser/i, '便携冲牙器'],
  [/camping.*bag|storage bag/i, '户外露营收纳袋'],
  [/PTZ camera/i, '太阳能 PTZ 摄像头'],
  [/fake.*dress|二件套|blatt/i, '仿两件套连衣裙'],
  [/lace.*dress|babydoll/i, '镂空蕾丝连衣裙'],
  [/cloud slide|non-slip.*sole/i, '厚底防滑云朵拖鞋'],
];

function getChineseTitle(title) {
  // Remove emojis and promo noise for matching
  const clean = title.replace(/[^ -~À-ɏ]/g, '').trim();
  for (const [re, cn] of CN_MAP) {
    if (re.test(clean) || re.test(title)) return cn;
  }
  // Fallback: extract main noun
  return extractNoun(clean);
}

function extractNoun(t) {
  const cleaned = t.replace(/\d+%\s*OFF|SALE|Rabatt|FREE|LIMITED|LAST DAY|HOT|🔥|⚡|💎|🏆|💥|✨|⏳|\bBUY\b|\bGET\b/gi,'').trim();
  const words = cleaned.split(/[\s,\-–|]+/).filter(w => w.length > 2).slice(0,3);
  return words.join(' ') || t.slice(0,30);
}

function getCategory(title) {
  for (const cat of CATS.slice(1)) {
    if (cat.match(title)) return cat.id;
  }
  return 'other';
}

function getCatLabel(id) {
  const c = CATS.find(x => x.id === id);
  return c ? c.label : '📦 其他';
}

function scoreColor(s) {
  if (s >= 18) return 'score-high';
  if (s >= 12) return 'score-mid';
  return 'score-low';
}

function rankBadge(i) {
  if (i === 0) return '<span class="rank rank-1">🥇 #1</span>';
  if (i === 1) return '<span class="rank rank-2">🥈 #2</span>';
  if (i === 2) return '<span class="rank rank-3">🥉 #3</span>';
  if (i < 10) return `<span class="rank">#${i+1}</span>`;
  return '';
}

function stripEmoji(s) {
  return s.replace(/[\u{1F000}-\u{1FFFF}\u{2600}-\u{27BF}]+/gu, '').replace(/\s+/g,' ').trim();
}

// Gradient palettes for placeholders
const GRADIENTS = [
  ['#e0e7ff','#c7d2fe'],['#fce7f3','#fbcfe8'],['#ecfdf5','#a7f3d0'],
  ['#fef3c7','#fde68a'],['#eff6ff','#bfdbfe'],['#f5f3ff','#ddd6fe'],
  ['#fff1f2','#fecdd3'],['#f0fdfa','#99f6e4'],
];
function cardGradient(i) {
  const [a,b] = GRADIENTS[i % GRADIENTS.length];
  return `background: linear-gradient(135deg, ${a} 0%, ${b} 100%);`;
}

// Category icons
const CAT_ICONS = {
  beauty:'💄',clothing:'👗',home:'🏠',auto:'🚗',electronics:'📱',tools:'🔧',all:'📦'
};
function catIcon(id) { return CAT_ICONS[id] || '📦'; }

let activecat = 'all';
let currentModal = null;

function openModal(idx) {
  const p = filtered()[idx] || RAW_DATA.find(x=>x._idx===idx);
  if (!p) return;
  currentModal = p;
  document.getElementById('modal-title').textContent = '📦 铺货站点 · ' + stripEmoji(p.title).slice(0,40);
  const ul = document.getElementById('modal-sites');
  ul.innerHTML = p.sites.map(s => {
    const isFlag = (p.flagship_hits||[]).includes(s);
    return `<li>
      <span>${s} ${isFlag ? '<span class=\"flagship-tag\">旗舰</span>' : ''}</span>
      <a href="https://${s}" target="_blank" rel="noopener">访问 →</a>
    </li>`;
  }).join('');
  document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('open');
  }
}

function filtered() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const sort = document.getElementById('sort').value;
  let data = RAW_DATA.map((p,i)=>({...p,_idx:i,_cat:getCategory(p.title)}));

  if (activecat !== 'all') {
    const catDef = CATS.find(x=>x.id===activecat);
    if (catDef) data = data.filter(p => catDef.match(p.title));
  }
  if (q) {
    data = data.filter(p =>
      p.title.toLowerCase().includes(q) ||
      p.handle.toLowerCase().includes(q) ||
      (p.sites||[]).some(s=>s.includes(q))
    );
  }
  if (sort === 'score') data.sort((a,b) => b.score - a.score);
  else if (sort === 'sites') data.sort((a,b) => b.sites_count - a.sites_count);
  else if (sort === 'flagship') data.sort((a,b) => b.flagship_count - a.flagship_count);
  else if (sort === 'price_asc') data.sort((a,b) => parseFloat(a.price) - parseFloat(b.price));
  else if (sort === 'price_desc') data.sort((a,b) => parseFloat(b.price) - parseFloat(a.price));
  return data;
}

function render() {
  const data = filtered();
  document.getElementById('result-count').textContent = data.length;
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  if (!data.length) { grid.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';

  grid.innerHTML = data.slice(0,50).map((p, vi) => {
    const orig_i = p._idx;
    const cn = getChineseTitle(p.title);
    const clean = stripEmoji(p.title);
    const flagships = p.flagship_hits || [];
    const hasFlag = flagships.length > 0;
    const priceNum = parseFloat(p.price);
    const currency = p.price && p.sample_url && p.sample_url.includes('.com') ? '€' : '€';
    const dateStr = (p.date || '').slice(5); // MM-DD
    
    return `<div class="card">
      <div class="card-img-wrap">
        ${rankBadge(vi)}
        <div class="card-img-placeholder" style="${cardGradient(orig_i)}" id="img-wrap-${orig_i}">
          <span>${catIcon(p._cat)}</span>
        </div>
      </div>
      <div class="card-body">
        <div class="card-top">
          <div class="card-title" title="${clean.replace(/"/g,'&quot;')}">${clean || p.title}</div>
          <span class="score-badge ${scoreColor(p.score)}">⭐ ${p.score}</span>
        </div>
        <div class="card-cn">🇨🇳 ${cn}</div>
        <div class="card-meta">
          <span class="meta-chip chip-price">💰 ${currency}${priceNum.toFixed(2)}</span>
          <span class="meta-chip chip-sites">🏪 ${p.sites_count} 家</span>
          ${hasFlag ? `<span class="meta-chip chip-flagship">⭐ ${p.flagship_count} 旗舰</span>` : ''}
          <span class="meta-chip chip-date">📅 ${dateStr}</span>
        </div>
        ${hasFlag ? `<div class="flagship-list"><strong>旗舰：</strong>${flagships.slice(0,3).join(' · ')}${flagships.length>3?` · +${flagships.length-3}`:''}</div>` : ''}
        <div class="card-actions">
          <a class="btn-sample" href="${p.sample_url}" target="_blank" rel="noopener">🔗 样品链接</a>
          <button class="btn-sites" onclick="openModal(${orig_i})" title="查看全部铺货站点">
            🏪 ${p.sites_count}
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function initCatTabs() {
  const wrap = document.getElementById('cat-tabs');
  // Count per category
  const counts = {};
  RAW_DATA.forEach(p => {
    const cat = getCategory(p.title);
    counts[cat] = (counts[cat]||0)+1;
  });
  
  const tabData = [
    ...CATS.map(c => ({...c, count: c.id==='all' ? RAW_DATA.length : (counts[c.id]||0)})),
    {id:'other', label:'📦 其他', match:()=>true, count: counts['other']||0}
  ].filter((c,i,arr) => c.id==='all' || c.count>0 || !arr.find(x=>x.id===c.id && x!==c));
  
  wrap.innerHTML = tabData.map(c =>
    `<button class="cat-tab${activecat===c.id?' active':''}" data-id="${c.id}" onclick="setcat('${c.id}')">${c.label} <span style="opacity:.6">${c.count}</span></button>`
  ).join('');
}

function setcat(id) {
  activecat = id;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.toggle('active', t.dataset.id===id));
  render();
}

function initStats() {
  const total = RAW_DATA.length;
  const withFlag = RAW_DATA.filter(p=>(p.flagship_hits||[]).length>0).length;
  const maxScore = Math.max(...RAW_DATA.map(p=>p.score));
  const avgSites = (RAW_DATA.reduce((a,p)=>a+p.sites_count,0)/total).toFixed(1);
  
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-pill">📦 <strong>${total}</strong> 个商品</div>
    <div class="stat-pill">⭐ 最高分 <strong>${maxScore}</strong></div>
    <div class="stat-pill">🏪 平均铺货 <strong>${avgSites}</strong> 家</div>
    <div class="stat-pill">🔥 旗舰命中 <strong>${withFlag}</strong> 个</div>
  `;
  document.getElementById('updated-time').textContent = new Date().toLocaleDateString('zh-CN');
}

// Init
initStats();
initCatTabs();
render();
</script>
